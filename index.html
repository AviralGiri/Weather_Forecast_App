<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" href="images/wicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
   <div class="container"> 
        <div class="mainbox" id="m1">
            <div><h1>Weather </h1>
            <h3>ForeCast</h3></div>
            <img src="images/wicon.png" id="wicon">
            <button class="go" id="letsGo">Let's Go</button>
        </div>
        <div class="mainbox inactive" id="m2">
            <div class="toggle">
                <p>°C</p>
                <label class="switch">
                    <input type="checkbox" class="check">
                    <span class="slider"></span>    
                </label>
                <p>°F</p>
            </div>
            <div class="searchBox">
                <input type="text" placeholder="Enter your city e.g.,Mumbai,Lucknow" class="input">
                <button class="search" id="srch"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="iconBox">
                <img src="images/clear.png" id="clear">
                <p id="desc">Description</p>
            </div>
            <div class="tempBox">
                <h1 id="temp">0°c</h1>
                <h3 id="cityName">City name</h3>
            </div>
            <div class="extraData">
                <div class="wind">
                    <img src="images/wind.png" id="windicon">
                    <div class="windData">
                        <p id="windSpeed">0 km/hr</p>
                        <p>Wind</p>
                    </div>
                </div>
            
                <div class="humidity">
                    <img src="images/humidity.png" id="humidicon">
                    <div class="humidData">
                        <p id="humidPer">0%</p>
                        <p>Humidity</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mainbox inactive" id="m3">
            <div class="err">
                <h1>404</h1>
                <h3>Oops! page not found</h3>
                    <p id="msg">The page you are looking for does not exist</p>
            </div>
            <button class="goHome" id="Back">Go Home</button>
        </div>
    </div>
    <script src="App.js"></script>
</body>
</html>
